services:
  cursogram:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # в”Ђв”Ђ Required в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS}

      # в”Ђв”Ђ Cursor CLI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - DANGEROUS_MODE=${DANGEROUS_MODE:-false}

      # в”Ђв”Ђ Work directory (Cursogram paths вЂ” avoids Cursor conflicts) в”Ђ
      - WORKSPACE_DIR=/cursogram/workspace

      # в”Ђв”Ђ Response settings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - STREAMING_MODE=${STREAMING_MODE:-streaming}
      - MAX_MESSAGE_LENGTH=4000
      - TELEGRAPH_ENABLED=${TELEGRAPH_ENABLED:-false}

      # в”Ђв”Ђ Voice / TTS (optional) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TRANSCRIBE_ENABLED=${TRANSCRIBE_ENABLED:-false}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - VOICE_LANGUAGE=${VOICE_LANGUAGE:-ar}
      - TTS_ENABLED=${TTS_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # в”Ђв”Ђ Node.js в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - NODE_ENV=production
      - BOT_MODE=prod


      # в”Ђв”Ђ Dokploy MCP (optional) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - DOKPLOY_MCP_ENABLED=${DOKPLOY_MCP_ENABLED:-false}
      - DOKPLOY_URL=${DOKPLOY_URL:-}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-}

      # в”Ђв”Ђ GitHub (gh + MCP) - dedicated org account в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-${GH_TOKEN:-}}
      - GIT_TERMINAL_PROMPT=0
      - GITHUB_MCP_ENABLED=${GITHUB_MCP_ENABLED:-false}

      # в”Ђв”Ђ Cursor CLI (full path in Docker for reliability) в”Ђ
      - CURSOR_CLI_PATH=/home/node/.local/bin/agent


      

    volumes:
      # Projects workspace (distinct path to avoid Cursor conflicts)
      - cursogram_workspace:/cursogram/workspace
      # Bot data: sessions, preferences (~/.claudegram)
      - cursogram_data:/home/node/.claudegram
      # Optional: mount server directory
      # - /home/user/projects:/cursogram/workspace

    # No ports needed because the bot uses polling
    # No need for nginx or a reverse proxy

volumes:
  cursogram_workspace:
    driver: local
  cursogram_data:
    driver: local
